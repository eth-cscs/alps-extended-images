include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

stages: [build-base, test-base, build-apps, test-apps, publish]

# ----------------------------
# Global variables
# ----------------------------
variables:
  IMAGE_PREFIX: jfrog.svc.cscs.ch/docker-group-csstaff/alps-images
  ALPS_REV: alps4-dev

# ----------------------------
# Image matrix anchors
# ----------------------------
# NOTE: Keep the matrices small to avoid "job name too long" issues

.alps_base_images_matrix: &alps_base_images_matrix
  - NGC_NAME: "pytorch"
    NGC_TAG: "26.01-py3"
  - NGC_NAME: "pytorch"
    NGC_TAG: "25.12-py3"
  - NGC_NAME: "nemo"
    NGC_TAG: "25.11.01"
  - NGC_NAME: "physicsnemo"
    NGC_TAG: "25.11"

.alps_app_images_matrix: &alps_app_images_matrix
  - NAME: "apertus-1p5"
  - NAME: "apertus-2"

# ----------------------------
# Dependency mapping for matrix jobs as anchors
# ----------------------------
# These are required to achieve unambiguous mapping between two matrix jobs
# when explicitly defining "needs:" in the downstream job, as GitLab does not
# support automatic mapping based on the matrix values.

.base_needs_map: &base_needs_map
  parallel:
    matrix:
      - NGC_NAME: ['$[[ matrix.NGC_NAME ]]']
        NGC_TAG: ['$[[ matrix.NGC_TAG ]]']

.app_needs_map: &app_needs_map
  parallel:
    matrix:
      - NAME: ['$[[ matrix.NAME ]]']

# ----------------------------
# Skopeo: manipulate images in the registry
# ----------------------------
.skopeo-template:
  image: quay.io/skopeo/stable:latest
  before_script:
    - source ci-pipelines/helpers/skopeo.sh
    - skopeo_login

# ----------------------------
# Slurm: set pertinent env variables
# ----------------------------
.slurm-template:
  variables:
    USE_MPI: NO
    SLURM_MPI_TYPE: pmix
    SLURM_NETWORK: disable_rdzv_get
    PMIX_MCA_psec: native

# ----------------------------
# Meta job: determines image name
# ----------------------------
# Creates content hash and determines if build is needed based on changes in
# relevant files. Passes necessary variables to the builder job via artifacts.

build-base-meta:
  stage: build-base
  extends: [.container-runner-lightweight-gh200, .skopeo-template]
  parallel:
    matrix: *alps_base_images_matrix
  script:
    - source ci-pipelines/helpers/meta.sh
    - |
      set -euo pipefail

      # Generate content-hash based image references and additional container build variables
      read -r BASE_IMAGE_REF REMOVE_HPCX_DIRS_B64 DOCKERFILE CANON_IMAGE_REF TEST_IMAGE_REF STABLE_IMAGE_REF < <(base_refs "$NGC_NAME" "$NGC_TAG")
      REMOVE_HPCX_DIRS="$(printf '%s' "$REMOVE_HPCX_DIRS_B64" | base64 -d)"

      # Export variables to a file for the builder job
      cat > build.env <<EOF
      DOCKERFILE=$DOCKERFILE
      NGC_VARIANT_DIR=${NGC_NAME}-${NGC_TAG}
      CANON_IMAGE_REF=$CANON_IMAGE_REF
      TEST_IMAGE_REF=$TEST_IMAGE_REF
      STABLE_IMAGE_REF=$STABLE_IMAGE_REF
      BASE_IMAGE=$BASE_IMAGE_REF
      REMOVE_HPCX_DIRS=$REMOVE_HPCX_DIRS
      OCI_SOURCE="${CI_PROJECT_URL}"
      OCI_REVISION="${CI_COMMIT_SHA:-$CI_COMMIT_SHORT_SHA}"
      OCI_CREATED="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      CSCS_ALPS_GIT_COMMIT_SHORT="${CI_COMMIT_SHORT_SHA}"
      EOF

      # For debugging: print the generated variables
      echo "Generated build variables:"
      cat build.env
  artifacts:
    reports:
      dotenv: build.env

build-apps-meta:
  stage: build-apps
  extends: [.container-runner-lightweight-gh200, .skopeo-template]
  parallel:
    matrix: *alps_app_images_matrix
  script:
    - source ci-pipelines/helpers/meta.sh
    - |
      set -euo pipefail

      # Generate content-hash based image references and additional container build variables
      read -r BASE_IMAGE_REF DOCKERFILE CANON_IMAGE_REF TEST_IMAGE_REF STABLE_IMAGE_REF < <(app_refs "$NAME")

      # Export variables to a file for the builder job
      cat > build_apps.env <<EOF
      DOCKERFILE=$DOCKERFILE
      CANON_IMAGE_REF=$CANON_IMAGE_REF
      TEST_IMAGE_REF=$TEST_IMAGE_REF
      STABLE_IMAGE_REF=$STABLE_IMAGE_REF
      BASE_IMAGE=$BASE_IMAGE_REF
      OCI_SOURCE="${CI_PROJECT_URL}"
      OCI_REVISION="${CI_COMMIT_SHA:-$CI_COMMIT_SHORT_SHA}"
      OCI_CREATED="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      CSCS_ALPS_GIT_COMMIT_SHORT="${CI_COMMIT_SHORT_SHA}"
      EOF

      # For debugging: print the generated variables
      echo "Generated build variables:"
      cat build_apps.env
  artifacts:
    reports:
      dotenv: build_apps.env

# ----------------------------
# Build images
# ----------------------------
# The build jobs read the variables generated in the meta jobs and build the
# images accordingly. BASE_IMAGE and REMOVE_HPCX_DIRS are passed as build args
# to the image builder.

.build-images-template:
  variables:
    CUSTOM_REGISTRY_USERNAME: $JFROG_USER
    CUSTOM_REGISTRY_PASSWORD: $JFROG_KEY
    CSCS_REBUILD_POLICY: if-not-exists
    CSCS_BUILD_CACHE: $CSCS_REGISTRY_PATH/build_cache
  before_script:
    - |
      set -euo pipefail
      export PERSIST_IMAGE_NAME="$CANON_IMAGE_REF"
      echo "Building: $PERSIST_IMAGE_NAME"
  timeout: 6h

build-base-images:
  stage: build-base
  extends: [.container-builder-cscs-gh200, .build-images-template]
  parallel:
    matrix: *alps_base_images_matrix
  needs:
    - job: build-base-meta
      artifacts: true
      <<: *base_needs_map
  variables:
    DOCKER_BUILD_ARGS: '[
      "BASE_IMAGE",
      "NGC_VARIANT_DIR",
      "REMOVE_HPCX_DIRS",
      "OCI_SOURCE",
      "OCI_REVISION",
      "OCI_CREATED",
      "CSCS_ALPS_GIT_COMMIT_SHORT"
    ]'

build-app-images:
  stage: build-apps
  extends: [.container-builder-cscs-gh200, .build-images-template]
  parallel:
    matrix: *alps_app_images_matrix
  needs:
    - job: build-apps-meta
      artifacts: true
      <<: *app_needs_map
  variables:
    DOCKER_BUILD_ARGS: '[
      "BASE_IMAGE",
      "OCI_SOURCE",
      "OCI_REVISION",
      "OCI_CREATED",
      "CSCS_ALPS_GIT_COMMIT_SHORT"
    ]'

# ----------------------------
# Re-tag images with commit SHA for testing
# ----------------------------
# The commit SHA is known at configuration time of the pipeline unlike the
# content hash, which becomes known only at runtime of the pipeline. Thus, we
# cannot use the content hash directly in the test stage to pull the image, but
# we can copy the image to a new tag with the commit SHA for the test stage.

.tag-images-template:
  extends: [.container-runner-lightweight-gh200, .skopeo-template]
  variables:
    CUSTOM_REGISTRY_USERNAME: $JFROG_USER
    CUSTOM_REGISTRY_PASSWORD: $JFROG_KEY
  script:
    - |
      set -euo pipefail
      copy_if_needed "$CANON_IMAGE_REF" "$TEST_IMAGE_REF"

tag-base-images-for-ci:
  stage: build-base
  extends: [.tag-images-template]
  parallel:
    matrix: *alps_base_images_matrix
  needs:
    - job: build-base-meta
      artifacts: true
      <<: *base_needs_map
    - job: build-base-images
      <<: *base_needs_map

tag-app-images-for-ci:
  stage: build-apps
  extends: [.tag-images-template]
  parallel:
    matrix: *alps_app_images_matrix
  needs:
    - job: build-apps-meta
      artifacts: true
      <<: *app_needs_map
    - job: build-app-images
      <<: *app_needs_map

# ----------------------------
# Run tests on the images
# ----------------------------
# The test jobs use the test tags created in the previous step. They run a set of
# sanity checks to verify the functionality of the images.
# Current tets for the baase images:
# - Ensure environment variables are set correctly
# - NCCL alltoall_perf
# - NVSHMEM alltoall_latency
# - OSU alltoall
# - vetnode diagnose
#   - basic cuda kernel launch
#   - NCCL low-level tests for intra-node, inter-node and full-topology scenarios
#   - NCCL through PyTorch
# Current tests for the app images:
# - Apertus 1.5: Megatron pretraining script
# - Apertus 2: pplx garden benchmark

test-base-images-env:
  stage: test-base
  extends: [.container-runner-clariden-gh200, .slurm-template]
  parallel:
    matrix: *alps_base_images_matrix
  image: "$IMAGE_PREFIX/ngc-${NGC_NAME}:${NGC_TAG}-${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    - |
      set -euo pipefail

      # Check that the relevant environment variables are set correctly in the image
      test "${FI_PROVIDER:-}" = "cxi"
      test "${FI_CXI_RDZV_PROTO:-}" = "alt_read"
      test "${NCCL_NET:-}" = "AWS Libfabric"
      test "${NCCL_PROTO:-}" = "^LL128"
      test "${NVSHMEM_REMOTE_TRANSPORT:-}" = "libfabric"
      test "${NVSHMEM_LIBFABRIC_PROVIDER:-}" = "cxi"

      # Check that the environment variables are exported with the correct semantics
      test "${NCCL_VERSION:-}" = "dummy"
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_NTASKS: 1
    # Set dummy value for environment variables to test that it will be overridden by the image's entrypoint or environment setup scripts
    NCCL_VERSION: dummy

test-base-images-collectives:
  stage: test-base
  extends: [.container-runner-clariden-gh200, .slurm-template]
  parallel:
    matrix: *alps_base_images_matrix
  image: "$IMAGE_PREFIX/ngc-${NGC_NAME}:${NGC_TAG}-${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    # NCCL
    - alltoall_perf -b 32 -e 4M -f 2 -g 1
    # NVSHMEM
    - /opt/nvshmem/bin/perftest/device/coll/alltoall_latency --datatype float -b 32 -e 4194304 -f 2
    # OSU
    - /usr/local/libexec/osu-micro-benchmarks/mpi/collective/osu_alltoall --type mpi_float --message-size 32:2^22:2 --full --tail-lat --accelerator cuda
  variables:
    SLURM_JOB_NUM_NODES: 2
    SLURM_NTASKS: 8

test-base-images-vetnode:
  stage: test-base
  extends: [.container-runner-clariden-gh200, .slurm-template]
  parallel:
    matrix: *alps_base_images_matrix
  image: "$IMAGE_PREFIX/ngc-${NGC_NAME}:${NGC_TAG}-${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    - echo "[image-vet] Set-up vetnode on $(hostname)... "
    - |
      if [ "$SLURM_LOCALID" -eq 0 ]; then
        wget -O /tmp/config.yaml https://raw.githubusercontent.com/eth-cscs/vetnode/refs/heads/main/examples/image-vet/config.yaml
        cd /tmp
        python -m venv --system-site-packages .venv
        source .venv/bin/activate
        pip install --no-cache-dir --index-url "https://jfrog.svc.cscs.ch/artifactory/api/pypi/pypi-remote/simple" vetnode
        vetnode setup /tmp/config.yaml
        touch /tmp/setup-done-${SLURM_JOB_ID}
      else
        echo "[image-vet] Waiting for setup on $(hostname)..."
        timeout=60
        while [ ! -f "/tmp/setup-done-${SLURM_JOB_ID}" ] && [ $timeout -gt 0 ]; do
            sleep 1
            ((timeout--))
        done
      fi
    - echo "[image-vet] diagnose"
    - cd /tmp
    - source .venv/bin/activate
    - vetnode diagnose /tmp/config.yaml
  variables:
    SLURM_JOB_NUM_NODES: 4
    SLURM_NTASKS: 16

test-apertus-1p5:
  stage: test-apps
  extends: [.container-runner-clariden-gh200, .slurm-template]
  timeout: 2h
  image: "$IMAGE_PREFIX/apertus-1p5:${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    - /opt/tests/apertus-1p5/megatron_pretrain.sh
  variables:
    CI_FAST: "1"
    TP_CI: "1"
    PP_CI: "1"
    USE_MPI: NO
    SLURM_JOB_NUM_NODES: 2
    SLURM_NTASKS: 8

test-apertus-2-pplx-garden:
  stage: test-apps
  extends: [.container-runner-clariden-gh200, .slurm-template]
  timeout: 2h
  image: "$IMAGE_PREFIX/apertus-2:${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    - /opt/tests/apertus-2/pplx-garden-benchmark.sh
  variables:
    SLURM_JOB_NUM_NODES: 2
    SLURM_NTASKS: 2

test-apertus-2-DeepEP:
  stage: test-apps
  extends: [.container-runner-clariden-gh200, .slurm-template]
  timeout: 2h
  image: "$IMAGE_PREFIX/apertus-2:${ALPS_REV}-$CI_COMMIT_SHORT_SHA"
  script:
    - /opt/tests/apertus-2/deep-ep-benchmark.sh
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_NTASKS: 1

# ----------------------------
# Publish
# ----------------------------
# Upload the images to the registry with stable tags under certain conditions:
# - All tests must have executed and passed (enforced by the "needs:"
#   dependency on the test jobs in the publish-gate job)
# - The commit must be on the default branch (enforced in the script with a
#   check on CI_COMMIT_BRANCH)
# - The stable tag must not already exist with different content (enforced by
#   promote_check_strict)

publish-gate:
  stage: publish
  extends: [.container-runner-lightweight-gh200, .skopeo-template]
  # make sure to keep the "needs" up to date when adding new test jobs
  needs:
    - test-base-images-env
    - test-base-images-collectives
    - test-base-images-vetnode
    - test-apertus-1p5
    - test-apertus-2-pplx-garden
    - test-apertus-2-DeepEP
  script:
    - echo "Publish gate passed (tests completed)"

.publish-template:
  stage: publish
  extends: [.container-runner-lightweight-gh200, .skopeo-template]
  script:
    - |
      set -euo pipefail
      echo "Publish check: $CANON_IMAGE_REF -> $STABLE_IMAGE_REF"

      if [[ "${ALPS_REV}" =~ -dev$ ]]; then
        # For dev versions, we allow non-strict promotion (overwrites stable
        # tag regardless of content) but only on the default branch
        if [[ "${CI_COMMIT_BRANCH}" == "${CI_DEFAULT_BRANCH}" ]]; then
          skopeo copy "$(_ref_url "$CANON_IMAGE_REF")" "$(_ref_url "$STABLE_IMAGE_REF")"
          echo "Promotion successful (dev version): $CANON_IMAGE_REF -> $STABLE_IMAGE_REF"
        else
          echo "Dry-run only (dev version detected and not default branch): promotion not executed."
        fi
      else
        # Always run strict check (fails if stable exists but differs)
        promote_check_strict "$CANON_IMAGE_REF" "$STABLE_IMAGE_REF"
        # Only promote on default branch
        if [[ "${CI_COMMIT_BRANCH}" == "${CI_DEFAULT_BRANCH}" ]]; then
          promote_strict "$CANON_IMAGE_REF" "$STABLE_IMAGE_REF"
          echo "Promotion successful: $CANON_IMAGE_REF -> $STABLE_IMAGE_REF"
        else
          echo "Dry-run only (not default branch): promotion not executed."
        fi
      fi

publish-base-images:
  extends: [.publish-template]
  parallel:
    matrix: *alps_base_images_matrix
  needs:
    - job: publish-gate
    - job: build-base-meta
      artifacts: true
      <<: *base_needs_map

publish-app-images:
  extends: [.publish-template]
  parallel:
    matrix: *alps_app_images_matrix
  needs:
    - job: publish-gate
    - job: build-apps-meta
      artifacts: true
      <<: *app_needs_map

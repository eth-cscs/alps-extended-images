include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

stages:
  - build
  - test

variables:
  IMAGE_NAME: jfrog.svc.cscs.ch/docker-group-csstaff/alps-images/alps-ngc-pytorch
  PERSIST_IMAGE_NAME: $IMAGE_NAME:25.12-py3

build-alps-ngc-pytorch:
  stage: build
  extends: [.container-builder-cscs-gh200]
  timeout: 6h
  variables:
    DOCKERFILE: Alps-Images/NGC/Pytorch/Dockerfile
    CUSTOM_REGISTRY_USERNAME: $JFROG_USER
    CUSTOM_REGISTRY_PASSWORD: $JFROG_KEY

test_job:
  stage: test
  extends: [.container-builder-cscs-gh200]
  image: $PERSIST_IMAGE_NAME
  script:
    - echo "Running tests on the built image..."
  variables:
    SLURM_JOB_NUM_NODES: 2
    SLURM_NTASKS: 4

